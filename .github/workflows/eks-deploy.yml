name: CI-CD to EKS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout code
      - name: Checkout Repo
        uses: actions/checkout@v3

      # 2. Configure Docker
      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 3. Build Docker Image
      - name: Build Image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/brain-tasks-app:latest .

      # 4. Push Docker Image
      - name: Push Image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/brain-tasks-app:latest

      # 5. Configure Kubernetes
      - name: Setup Kubeconfig
        run: |
          echo "${{ secrets.KUBE_CONFIG }}" | base64 --decode > kubeconfig
          export KUBECONFIG=$PWD/kubeconfig

      # 6. Deploy to EKS
      - name: Deploy to EKS
        run: |
          kubectl apply -f kubernetes/deployment.yaml
          kubectl apply -f kubernetes/service.yaml

      # 7. Verify deployment
      - name: Check pods
        run: |
          kubectl get pods
          kubectl get svc